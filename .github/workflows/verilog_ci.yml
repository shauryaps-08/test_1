# ============================================================
# GitHub Actions CI Workflow for Verilog RTL Verification
# ============================================================

name: Verilog RTL CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '**.v'
      - '**.sv'
      - '**.vh'
      - '.github/workflows/verilog_ci.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**.v'
      - '**.sv'
      - '**.vh'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------
  # JOB 0: Discover RTL files + auto-detect top module name
  # ------------------------------------------------------------
  discover:
    name: Discover RTL Files
    runs-on: ubuntu-latest

    outputs:
      rtl_files:  ${{ steps.find.outputs.rtl_files }}
      tb_files:   ${{ steps.find.outputs.tb_files }}
      top_module: ${{ steps.find.outputs.top_module }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List repository structure (debug)
        run: find . -not -path './.git/*' | sort

      - name: Find RTL/TB files and detect top module
        id: find
        run: |
          # ── Testbench files: inside tb/ or testbench/, or named tb_*.v
          TB=$(find . \
                 -not -path './.git/*' \
                 \( -path './tb/*' -o -path './testbench/*' -o -name "tb_*.v" -o -name "tb_*.sv" \) \
                 \( -name "*.v" -o -name "*.sv" \) \
               | sort | tr '\n' ' ')

          # ── RTL files: everything else (excluding tb dirs and git)
          RTL=$(find . \
                  -not -path './.git/*' \
                  -not -path './tb/*' \
                  -not -path './testbench/*' \
                  -not -name "tb_*.v" \
                  -not -name "tb_*.sv" \
                  \( -name "*.v" -o -name "*.sv" \) \
                | sort | tr '\n' ' ')

          echo "RTL files : $RTL"
          echo "TB  files : $TB"

          if [ -z "$RTL" ]; then
            echo "::error::No RTL .v/.sv files found in the repo."
            exit 1
          fi

          # ── Auto-detect top module:
          #    Parse all RTL files for 'module <name>' declarations.
          #    The top module is the one whose name is NOT instantiated
          #    inside any other module (i.e. it appears as a declaration
          #    but never as an instance call in another file).
          #
          #    Simple heuristic for single-file projects: just grab the
          #    first module name found. For multi-file: pick the module
          #    that is never referenced as an instance elsewhere.

          # Extract all declared module names
          ALL_MODULES=$(grep -rh --include="*.v" --include="*.sv" \
                          -E '^\s*module\s+\w+' . \
                        | grep -v '\.git' \
                        | sed -E 's/^\s*module\s+(\w+).*/\1/' \
                        | sort -u)

          echo "All declared modules: $ALL_MODULES"

          TOP_MODULE=""
          for MOD in $ALL_MODULES; do
            # Check if this module is instantiated anywhere
            # Instantiation pattern: <ModuleName> <instance_name> (
            INSTANCES=$(grep -rh --include="*.v" --include="*.sv" \
                          -E "^\s*${MOD}\s+\w+" . \
                        | grep -v "module\s*${MOD}" \
                        | grep -v '\.git' \
                        | wc -l)
            echo "  Module '$MOD' instantiated $INSTANCES time(s) in other files"
            if [ "$INSTANCES" -eq 0 ]; then
              TOP_MODULE=$MOD
              # Don't break — last non-instantiated module wins
              # (handles cases where tb_ modules are also non-instantiated)
            fi
          done

          # If heuristic fails, fall back to first declared module
          if [ -z "$TOP_MODULE" ]; then
            TOP_MODULE=$(echo "$ALL_MODULES" | head -1)
            echo "::warning::Could not auto-detect top module; using '$TOP_MODULE' as fallback."
          fi

          echo "Detected top module: $TOP_MODULE"

          echo "rtl_files=$RTL"    >> $GITHUB_OUTPUT
          echo "tb_files=$TB"      >> $GITHUB_OUTPUT
          echo "top_module=$TOP_MODULE" >> $GITHUB_OUTPUT

  # ------------------------------------------------------------
  # JOB 1: Lint with Verilator
  # ------------------------------------------------------------
  lint:
    name: Lint (Verilator)
    runs-on: ubuntu-latest
    needs: discover

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Verilator
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y verilator

      - name: Print Verilator version
        run: verilator --version

      - name: Run Verilator lint
        run: |
          echo "Top module : ${{ needs.discover.outputs.top_module }}"
          echo "RTL files  : ${{ needs.discover.outputs.rtl_files }}"
          verilator --lint-only \
            --Wall \
            --Wno-DECLFILENAME \
            --Wno-fatal \
            --top-module ${{ needs.discover.outputs.top_module }} \
            ${{ needs.discover.outputs.rtl_files }}
        # --Wno-DECLFILENAME  → suppresses the "filename≠module name" warning
        # --Wno-fatal         → warnings don't abort the run
        # Remove --Wno-fatal to treat ALL warnings as errors (strict mode)

  # ------------------------------------------------------------
  # JOB 2: Compile & Simulate with Icarus Verilog
  # ------------------------------------------------------------
  simulate:
    name: Compile & Simulate (iverilog)
    runs-on: ubuntu-latest
    needs: [discover, lint]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Icarus Verilog
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y iverilog

      - name: Compile RTL + testbench
        run: |
          TB="${{ needs.discover.outputs.tb_files }}"
          RTL="${{ needs.discover.outputs.rtl_files }}"
          echo "Compiling RTL: $RTL"
          echo "With TB      : $TB"
          iverilog -g2012 -Wall -o sim.out $RTL $TB

      - name: Run simulation
        run: vvp sim.out

      - name: Upload waveform on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: waveform-dump
          path: '*.vcd'
          retention-days: 7

  # ------------------------------------------------------------
  # JOB 3: CI Summary
  # ------------------------------------------------------------
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [discover, lint, simulate]
    if: always()

    steps:
      - name: Write summary
        run: |
          echo "## Verilog RTL CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Auto-detected top module:** \`${{ needs.discover.outputs.top_module }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Discover RTL Files  | ${{ needs.discover.outputs.top_module != '' && '✅ passed' || '❌ failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint (Verilator)    | ${{ needs.lint.result }} |"     >> $GITHUB_STEP_SUMMARY
          echo "| Simulate (iverilog) | ${{ needs.simulate.result }} |" >> $GITHUB_STEP_SUMMARY
