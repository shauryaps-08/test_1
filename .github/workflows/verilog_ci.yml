# ============================================================
# GitHub Actions CI Workflow for Verilog RTL Verification
# ============================================================
# Triggers on push/PR to main and develop branches.
# Steps: Lint → Compile → Simulate → (optional) Formal Lint
# Tools used:
#   - Verilator  (lint + compile + simulation)
#   - iverilog   (alternative compile + simulate)
# ============================================================

name: Verilog RTL CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '**.v'
      - '**.sv'
      - '**.vh'
      - '.github/workflows/verilog_ci.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**.v'
      - '**.sv'
      - '**.vh'

# Cancel any in-progress run for the same branch on new push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------
  # JOB 0: Discover RTL files (shared across jobs via output)
  # Searches the ENTIRE repo root — no hardcoded folder assumed
  # ------------------------------------------------------------
  discover:
    name: Discover RTL Files
    runs-on: ubuntu-latest

    outputs:
      rtl_files: ${{ steps.find.outputs.rtl_files }}
      tb_files:  ${{ steps.find.outputs.tb_files }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List repository structure (debug)
        run: find . -not -path './.git/*' | sort

      - name: Find .v / .sv files
        id: find
        run: |
          # ── RTL files: everything that is NOT inside tb/ or testbench/ dirs
          RTL=$(find . \
                  -not -path './.git/*' \
                  -not -path './tb/*' \
                  -not -path './testbench/*' \
                  \( -name "*.v" -o -name "*.sv" \) \
                | sort | tr '\n' ' ')

          # ── Testbench files: inside tb/ or testbench/, or named tb_*.v
          TB=$(find . \
                 -not -path './.git/*' \
                 \( -path './tb/*' -o -path './testbench/*' -o -name "tb_*.v" \) \
                 \( -name "*.v" -o -name "*.sv" \) \
               | sort | tr '\n' ' ')

          echo "RTL files  : $RTL"
          echo "TB  files  : $TB"

          if [ -z "$RTL" ]; then
            echo "::error::No .v or .sv RTL files found anywhere in the repo."
            exit 1
          fi

          # Expose as job outputs
          echo "rtl_files=$RTL" >> $GITHUB_OUTPUT
          echo "tb_files=$TB"   >> $GITHUB_OUTPUT

  # ------------------------------------------------------------
  # JOB 1: Lint with Verilator
  # Catches syntax errors, width mismatches, unused signals, etc.
  # ------------------------------------------------------------
  lint:
    name: Lint (Verilator)
    runs-on: ubuntu-latest
    needs: discover

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Verilator
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y verilator

      - name: Print Verilator version
        run: verilator --version

      - name: Run Verilator lint
        run: |
          # --------------------------------------------------------
          # CUSTOMISE: replace 'your_top_module' with your actual
          # top-level module name (e.g. alu, uart_tx, soc_top …)
          # --------------------------------------------------------
          verilator --lint-only \
            --Wall \
            --Wno-fatal \
            --top-module your_top_module \
            ${{ needs.discover.outputs.rtl_files }}
        # Flags:
        #   --Wall      → enable all warnings
        #   --Wno-fatal → warnings are warnings, not errors (remove to be strict)

  # ------------------------------------------------------------
  # JOB 2: Compile & Simulate with Icarus Verilog (iverilog)
  # Runs the testbench and checks for $finish / exit code
  # ------------------------------------------------------------
  simulate:
    name: Compile & Simulate (iverilog)
    runs-on: ubuntu-latest
    needs: [discover, lint]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Icarus Verilog
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y iverilog

      - name: Print iverilog version
        run: iverilog -V

      - name: Compile RTL + testbench
        run: |
          # If no separate TB files exist, iverilog will still compile RTL-only
          TB="${{ needs.discover.outputs.tb_files }}"
          iverilog -g2012 \
            -o sim.out \
            ${{ needs.discover.outputs.rtl_files }} \
            $TB

      - name: Run simulation
        run: |
          # vvp exits non-zero if the testbench calls $fatal or errors out
          vvp sim.out

      - name: Upload waveform dump on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: waveform-dump
          path: '*.vcd'
          retention-days: 7

  # ------------------------------------------------------------
  # JOB 3: Results summary
  # ------------------------------------------------------------
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, simulate]
    if: always()

    steps:
      - name: Write job summary
        run: |
          echo "## Verilog RTL CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint (Verilator)    | ${{ needs.lint.result }} |"     >> $GITHUB_STEP_SUMMARY
          echo "| Simulate (iverilog) | ${{ needs.simulate.result }} |" >> $GITHUB_STEP_SUMMARY
