# ============================================================
# GitHub Actions CI Workflow for Verilog RTL Verification
# ============================================================
# Triggers on push/PR to main and develop branches.
# Steps: Lint → Compile → Simulate → (optional) Formal Lint
# Tools used:
#   - Verilator  (lint + compile + simulation)
#   - iverilog   (alternative compile + simulate)
#   - sv2v       (optional SystemVerilog → Verilog conversion)
# ============================================================

name: Verilog RTL CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '**.v'
      - '**.sv'
      - '**.vh'
      - '.github/workflows/verilog_ci.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**.v'
      - '**.sv'
      - '**.vh'

# Cancel any in-progress run for the same branch on new push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------
  # JOB 1: Lint with Verilator
  # Catches syntax errors, width mismatches, unused signals, etc.
  # ------------------------------------------------------------
  lint:
    name: Lint (Verilator)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Verilator
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y verilator

      - name: Print Verilator version
        run: verilator --version

      # Adjust --top-module and source directory to match your project
      - name: Find Verilog source files
        id: find_files
        run: |
          # Collect all .v and .sv files under rtl/ recursively
          FILES=$(find ./rtl -name "*.v" -o -name "*.sv" | sort | tr '\n' ' ')
          if [ -z "$FILES" ]; then
            echo "ERROR: No .v or .sv files found under ./rtl/" >&2
            exit 1
          fi
          echo "Found RTL files: $FILES"
          # Save to env so next step can use it
          echo "RTL_FILES=$FILES" >> $GITHUB_ENV

      - name: Run Verilator lint
        run: |
          verilator --lint-only \
            --Wall \
            --top-module your_top_module \
            -I./rtl/include \
            $RTL_FILES
        # Common flags:
        #   --Wall        → enable all warnings
        #   --Wno-fatal   → demote warnings (add this flag to be lenient)
        #   -I<dir>       → header / `include search path

  # ------------------------------------------------------------
  # JOB 2: Compile & Simulate with Icarus Verilog (iverilog)
  # Runs the testbench and checks for $finish / exit code
  # ------------------------------------------------------------
  simulate:
    name: Compile & Simulate (iverilog)
    runs-on: ubuntu-latest
    needs: lint          # only simulate if lint passes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Icarus Verilog
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y iverilog

      - name: Print iverilog version
        run: iverilog -V

      # -----------------------------------------------------------------
      # Compile RTL + testbench into a simulation executable
      # Adjust source globs and top-level testbench name as needed
      # -----------------------------------------------------------------
      - name: Find Verilog source files
        run: |
          FILES=$(find ./rtl -name "*.v" -o -name "*.sv" | sort | tr '\n' ' ')
          if [ -z "$FILES" ]; then
            echo "ERROR: No .v or .sv files found under ./rtl/" >&2
            exit 1
          fi
          echo "RTL_FILES=$FILES" >> $GITHUB_ENV

      - name: Compile RTL and testbench
        run: |
          iverilog -g2012 \
            -I ./rtl/include \
            -o sim.out \
            $RTL_FILES \
            ./tb/tb_your_top_module.v

      # -----------------------------------------------------------------
      # Run the simulation
      # The workflow fails automatically if vvp exits with non-zero
      # (use $finish in your testbench, or $fatal to force a failure)
      # -----------------------------------------------------------------
      - name: Run simulation
        run: vvp sim.out

      # -----------------------------------------------------------------
      # (Optional) Upload waveform dump for debugging failed runs
      # Requires your testbench to call $dumpfile / $dumpvars
      # -----------------------------------------------------------------
      - name: Upload waveform dump
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: waveform-dump
          path: '*.vcd'
          retention-days: 7

  # ------------------------------------------------------------
  # JOB 3: Verilator C++ Build + Simulation (faster & synthesisable check)
  # Compiles the design to C++ and runs a C++ testbench
  # This job is optional – remove if you don't have a C++ tb
  # ------------------------------------------------------------
  verilator-sim:
    name: Verilator C++ Simulation
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y verilator make g++

      # Build using the Makefile in your sim/ or tb/ directory
      # Replace with your actual build command
      - name: Build Verilator simulation
        run: |
          make -C sim/ -f Makefile.verilator

      - name: Run Verilator simulation
        run: ./sim/obj_dir/Vyour_top_module

  # ------------------------------------------------------------
  # JOB 4: Results summary
  # Posts a summary to the GitHub Actions UI
  # ------------------------------------------------------------
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, simulate]
    if: always()

    steps:
      - name: Write job summary
        run: |
          echo "## Verilog RTL CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint (Verilator)     | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Simulate (iverilog)  | ${{ needs.simulate.result }} |" >> $GITHUB_STEP_SUMMARY
